name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]  # Trigger on push to the main branch
  workflow_dispatch:     # Allow manual workflow runs

permissions:
  contents: write         # Allow committing the updated Gemfile.lock
  pages: write            # Allow publishing to GitHub Pages
  id-token: write         # Required for GitHub Pages deployment

concurrency:
  group: "pages"          # Ensure only one deployment runs at a time
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Ruby environment
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      # Step 3: Unset deployment mode and install dependencies
      - name: Install dependencies and update Gemfile.lock
        run: |
          bundle config unset deployment || true
          bundle install
          if [[ -n $(git status --porcelain Gemfile.lock) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Gemfile.lock
            git commit -m "Update Gemfile.lock to match Gemfile"
            git push
          fi

      # Step 4: Build the Jekyll site
      - name: Build Jekyll site
        run: bundle exec jekyll build --destination ./_site

      # Step 5: Upload the built site as an artifact for deployment
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages          # Deployment environment
    runs-on: ubuntu-22.04         # Use the same runner for deployment
    needs: build                  # Wait for the build job to finish
    steps:
      # Step 6: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
